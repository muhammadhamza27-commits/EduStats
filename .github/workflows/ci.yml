name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install --no-package-lock
      - name: Run unit tests
        run: npm test
      - name: Run smoke test
        run: npm run smoke
